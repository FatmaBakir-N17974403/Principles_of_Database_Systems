<!DOCTYPE html>
<html>
<head>
    <title>Reports</title>
</head>
<body>

<h1>Healthcare Claims System</h1>
<a href="/">Home</a>

<h2>Claims per Provider</h2>

<table border="1" cellpadding="5">
    <tr>
        <th>Provider</th>
        <th>Total Claims</th>
        <th>Total Amount</th>
    </tr>

    {% for r in report %}
    <tr>
        <td>{{ r[0] }}</td>
        <td>{{ r[1] }}</td>
        <td>{{ r[2] }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
